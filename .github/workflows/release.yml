name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vsync-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vsync-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vsync-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vsync-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/vsync.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/vsync ${{ matrix.artifact }}
          fi
      - uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: ${{ matrix.artifact }}
